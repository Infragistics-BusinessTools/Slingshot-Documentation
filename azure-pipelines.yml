# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

#trigger:
#- master

pool:
  name: "BusinessTools On-Prem Documentation"

steps:
- checkout: self
  clean: true
  submodules: true
  
- task: DeleteFiles@1
  inputs:
    SourceFolder: 
    Contents: |
      package-lock.json
- task: CmdLine@2
  inputs:
    script: 'npm install'
# get the Reveal repo
- task: CmdLine@2
  inputs:
    script: 'git submodule update --init --recursive'
- task: Npm@1
  inputs:
    command: 'custom'
    customCommand: 'run build:staging'
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'docfx/en/_site'
    ArtifactName: 'docs'
    publishLocation: 'FilePath'
    TargetPath: '\\igbgsofsmb2\builds\Slingshot\Docs\$(Build.DefinitionName)\$(Build.BuildNumber)'
    Parallel: true