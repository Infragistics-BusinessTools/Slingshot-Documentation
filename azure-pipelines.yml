# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

#trigger:
#- master

pool:
  name: "BusinessTools On-Prem Documentation"

parameters:
  - name: forcePublishArtifacts
    type: boolean
    displayName: Force Publish Artifacts
    default: false

variables:
  forcePublishArtifacts: ${{ parameters.forcePublishArtifacts }}

steps:
- checkout: self
  clean: true
  submodules: true
  
- task: DeleteFiles@1
  inputs:
    SourceFolder: 
    Contents: |
      package-lock.json
- task: CmdLine@2
  displayName: Clear npm cache
  condition: ne(variables['cleanNpmCache'], 'false')
  inputs:
    script: 'npm cache clear --force'
- task: CmdLine@2
  displayName: "Npm install" 
  inputs:
    script: 'npm install'
# get the Reveal repo
- task: CmdLine@2
  displayName: "Update/Fetch submodules" 
  inputs:
    script: 'git submodule update --recursive --remote'
- task: CmdLine@2
  displayName: "Build Slingshot docfx (Staging)" 
  inputs:
    script: 'npm run build:staging'

- task: ArchiveFiles@2
  condition: or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables.forcePublishArtifacts, true))
  displayName: Archive staging EN site
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)\docfx\en\_site'
    includeRootFolder: false
    archiveType: 'tar'
    archiveFile: '$(Build.ArtifactStagingDirectory)\staging\en\staging_site_en.tar.gz'
    replaceExistingArchive: true

- task: PublishBuildArtifacts@1
  condition: or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables.forcePublishArtifacts, true))
  displayName: Publish staging EN site
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)\staging\en'
    ArtifactName: 'docs_staging_site_en'
    publishLocation: 'Container'

- task: PublishBuildArtifacts@1
  condition: or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables.forcePublishArtifacts, true))
  displayName: "Copy staging artifacts to local builds server"
  inputs:
    PathtoPublish: 'docfx\en'
    ArtifactName: 'docs_staging'
    publishLocation: 'FilePath'
    TargetPath: '\\igbgsofsmb2\builds\Slingshot\Docs\$(Build.DefinitionName)\$(Build.BuildNumber)'
    Parallel: true
- task: CmdLine@2
  displayName: "Build Slingshot docfx (Production)" 
  inputs:
    script: 'npm run build:prod'

- task: ArchiveFiles@2
  condition: or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables.forcePublishArtifacts, true))
  displayName: Archive production EN site
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)\docfx\en\_site'
    includeRootFolder: false
    archiveType: 'tar'
    archiveFile: '$(Build.ArtifactStagingDirectory)\production\en\production_site_en.tar.gz'
    replaceExistingArchive: true
- task: PublishBuildArtifacts@1
  condition: or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables.forcePublishArtifacts, true))
  displayName: Publish production EN site
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)\production\en'
    ArtifactName: 'docs_production_site_en'
    publishLocation: 'Container'

- task: PublishBuildArtifacts@1
